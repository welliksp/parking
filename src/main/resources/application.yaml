spring:
  application:
    name: parking
  web:
    resources:
      add-mappings: false
    error:
      whitelabel:
        enabled: false
server:
  port: 3003

logging:
  level:
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers,threaddump,heapdump,parking
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

info:
  app:
    name: Parking Management System
    description: Sistema de gerenciamento de estacionamento Estapar
    version: 1.0.0

garage:
  simulator:
    url: http://localhost:3000