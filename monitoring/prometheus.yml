global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'parking-monitor'

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'parking-application'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['172.17.0.1:3003']
        labels:
          application: 'parking'
          environment: 'development'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
